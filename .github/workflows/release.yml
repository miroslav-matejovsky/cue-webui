name: Release

on:
  push:
    tags:
      - 'v*'

# Default to read-only; only the release job is granted write access.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o cue-webui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd

      - uses: actions/upload-artifact@v4
        with:
          name: cue-webui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cue-webui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    # Only this job needs write access to create the release.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} artifacts/* \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag
